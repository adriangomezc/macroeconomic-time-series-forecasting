name: Automated R Analysis

# ¿Cuándo se ejecutará este código?
on:
  push:
    branches:
      - main # Se ejecuta cada vez que subas cambios a la rama 'main'
  workflow_dispatch: # Te añade un botón para ejecutarlo manualmente cuando quieras

# Permisos para que el robot pueda sobreescribir y guardar los gráficos en tu repo
permissions:
  contents: write

jobs:
  run-r-script:
    runs-on: ubuntu-latest # El servidor de GitHub usará Linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Esto instala los paquetes de R muchísimo más rápido

      - name: Install required R packages
        run: |
          install.packages(c("tidyverse", "forecast", "feasts", "tsibble", "patchwork", "lubridate"))
        shell: Rscript {0}

      - name: Ensure outputs folder exists
        run: mkdir -p outputs

      - name: Run the analysis script
        run: Rscript scripts/analysis.R # Asegúrate de que el nombre coincide con tu script

      - name: Commit and push generated outputs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add outputs/*
          git commit -m "chore: auto-generate analysis outputs" || echo "No changes to commit"
          git push
